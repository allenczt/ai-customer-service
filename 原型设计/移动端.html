<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>智能客服中心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand-deep:    #0A1628;
      --brand-accent:  #2B7FFF;
      --brand-teal:    #00C9B1;
      --brand-gold:    #F5A623;

      --bg-page:       #F0F4FA;
      --bg-card:       #FFFFFF;
      --bg-user-msg:   #2B7FFF;
      --bg-ai-msg:     #FFFFFF;
      --bg-input:      #F5F7FB;

      --text-primary:  #1A2340;
      --text-secondary:#5A6A8A;
      --text-muted:    #9AAAC0;
      --text-white:    #FFFFFF;

      --border:        #E2E8F4;
      --shadow-sm:     0 2px 8px rgba(10,22,40,.06);
      --shadow-md:     0 6px 24px rgba(10,22,40,.10);

      --radius-sm:     8px;
      --radius-md:     14px;
      --radius-lg:     20px;
      --radius-full:   50%;

      --font:          'Noto Sans SC', -apple-system, sans-serif;
      --transition:    .22s cubic-bezier(.4,0,.2,1);
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg-page);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* Floating Button */
    .fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--brand-accent), #1A6FE8);
      border-radius: var(--radius-full);
      box-shadow: 0 8px 24px rgba(43,127,255,.45);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      transition: var(--transition);
      z-index: 50;
    }
    .fab:hover { transform: scale(1.08); }
    .fab:active { transform: scale(.95); }

    /* FAB pulse animation */
    .fab::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: inherit;
      background: inherit;
      opacity: .4;
      animation: fab-pulse 2s infinite;
      z-index: -1;
    }
    @keyframes fab-pulse {
      0%,100% { transform: scale(1); opacity: .4; }
      50%      { transform: scale(1.15); opacity: 0; }
    }

    /* Chat Overlay */
    .chat-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-page);
      z-index: 100;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform .4s cubic-bezier(.4,0,.2,1);
    }
    .chat-overlay.open {
      transform: translateY(0);
    }

    /* Chat Header */
    .chat-header {
      background: var(--brand-deep);
      padding: 0 16px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .btn-close {
      width: 36px; height: 36px;
      border: none;
      background: rgba(255,255,255,.08);
      border-radius: 50%;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }
    .btn-close:hover { background: rgba(255,255,255,.15); }

    .btn-call-header {
      width: 38px; height: 38px;
      border: none;
      background: rgba(0,201,177,.15);
      border-radius: 50%;
      color: var(--brand-teal);
      font-size: 17px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .chat-agent-info { flex: 1; display: flex; align-items: center; gap: 10px; }
    .agent-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--brand-accent), var(--brand-teal));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      position: relative;
    }
    .agent-avatar::after {
      content: '';
      position: absolute;
      bottom: 1px; right: 1px;
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--brand-teal);
      border: 2px solid var(--brand-deep);
    }
    .agent-name { font-size: 15px; font-weight: 600; color: #fff; }
    .agent-status { font-size: 11px; color: var(--brand-teal); display: flex; align-items: center; gap: 4px; }
    .agent-status::before {
      content: ''; width: 5px; height: 5px; border-radius: 50%;
      background: var(--brand-teal);
    }

    /* Category Chips (消息区内分类按钮) */
    .category-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 2px 0;
    }
    .cat-chip {
      padding: 6px 12px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 12px;
      color: var(--text-primary);
      cursor: pointer;
      transition: var(--transition);
      font-family: var(--font);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .cat-chip:hover {
      background: rgba(43,127,255,.08);
      border-color: var(--brand-accent);
      color: var(--brand-accent);
    }

    /* FAQ Sub Panel (分类下热门问题) */
    .faq-sub-panel {
      display: none;
      flex-direction: column;
    }
    .faq-sub-panel.open { display: flex; }
    .faq-sub-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .faq-sub-back {
      width: 28px; height: 28px;
      border: none;
      background: var(--bg-input);
      border-radius: 50%;
      font-size: 20px;
      color: var(--brand-accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      line-height: 1;
    }
    .faq-sub-title { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .faq-sub-hint {
      font-size: 10px;
      color: var(--brand-accent);
      background: rgba(43,127,255,.08);
      padding: 2px 7px;
      border-radius: 100px;
      margin-left: auto;
    }
    .faq-sub-list { display: flex; flex-direction: column; gap: 6px; }
    .faq-sub-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: var(--transition);
      font-family: var(--font);
      text-align: left;
    }
    .faq-sub-item:hover {
      border-color: var(--brand-accent);
      background: rgba(43,127,255,.04);
    }
    .faq-sub-rank {
      width: 18px; height: 18px;
      border-radius: 4px;
      background: rgba(43,127,255,.1);
      color: var(--brand-accent);
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .faq-sub-item:first-child .faq-sub-rank {
      background: rgba(245,166,35,.15);
      color: var(--brand-gold);
    }
    .faq-sub-text { font-size: 12px; color: var(--text-primary); flex: 1; line-height: 1.4; }
    .faq-sub-arrow { font-size: 14px; color: var(--text-muted); }

    /* Messages Area */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg-row { display: flex; gap: 10px; align-items: flex-start; animation: msg-in .3s ease; }
    @keyframes msg-in { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
      margin-top: 2px;
    }
    .msg-avatar.ai { background: linear-gradient(135deg, var(--brand-accent), var(--brand-teal)); }
    .msg-avatar.user-av { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 11px; font-weight: 600; }

    .msg-content { max-width: 78%; display: flex; flex-direction: column; gap: 4px; }
    .msg-row.ai .msg-content { align-items: flex-start; }
    .msg-row.user .msg-content { align-items: flex-end; }
    .msg-row.ai .msg-bubble { border-bottom-left-radius: 4px; }
    .msg-row.user .msg-bubble { border-bottom-right-radius: 4px; }

    .msg-bubble {
      padding: 11px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }
    .msg-bubble.ai {
      background: var(--bg-ai-msg);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
    }
    .msg-bubble.user {
      background: var(--bg-user-msg);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-time { font-size: 10px; color: var(--text-muted); padding: 0 4px; }

    /* Typing */
    .typing-indicator {
      display: flex; align-items: center; gap: 4px;
      padding: 12px 16px;
      background: var(--bg-ai-msg);
      border: 1px solid var(--border);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .typing-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-muted);
      animation: typing-bounce .9s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .15s; }
    .typing-dot:nth-child(3) { animation-delay: .3s; }
    @keyframes typing-bounce {
      0%,60%,100% { transform:translateY(0); opacity:.4; }
      30% { transform:translateY(-6px); opacity:1; }
    }

    /* Category Question List (显示在消息气泡内) */
    .cat-q-header {
      font-size: 13px;
      font-weight: 600;
      color: var(--brand-accent);
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .cat-question-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .cat-question-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: var(--transition);
    }
    .cat-question-item:hover {
      border-color: var(--brand-accent);
      background: rgba(43,127,255,.06);
    }
    .cat-q-num {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      background: rgba(43,127,255,.1);
      color: var(--brand-accent);
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .cat-question-item:first-child .cat-q-num {
      background: rgba(245,166,35,.15);
      color: var(--brand-gold);
    }
    .cat-q-text {
      font-size: 12px;
      color: var(--text-primary);
      flex: 1;
      line-height: 1.4;
    }
    .cat-q-arrow {
      font-size: 14px;
      color: var(--text-muted);
    }
    .cat-more-btn {
      margin-top: 10px;
      padding: 8px 12px;
      background: rgba(43,127,255,.06);
      border: 1px dashed rgba(43,127,255,.3);
      border-radius: var(--radius-sm);
      font-size: 12px;
      color: var(--brand-accent);
      cursor: pointer;
      text-align: center;
      transition: var(--transition);
    }
    .cat-more-btn:hover {
      background: rgba(43,127,255,.1);
      border-style: solid;
    }
    .cat-tip {
      margin-top: 10px;
      padding: 8px 10px;
      background: var(--bg-input);
      border-radius: var(--radius-sm);
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
    }

    /* Thinking State */
    .thinking-bubble {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--bg-ai-msg);
      border: 1px solid var(--border);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
    }
    .thinking-dots {
      display: flex;
      gap: 4px;
    }
    .thinking-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--brand-accent);
      animation: thinking-pulse 1.4s infinite;
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes thinking-pulse {
      0%, 100% { transform: scale(0.8); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 1; }
    }
    .thinking-text {
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* Feedback Bar (已解决 / 未解决) */
    .feedback-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }
    .feedback-label {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .feedback-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-family: var(--font);
      cursor: pointer;
      transition: var(--transition);
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
    }
    .feedback-btn:hover { opacity: .85; }
    .feedback-btn.resolved {
      border-color: rgba(0,201,177,.35);
      color: #009e8c;
      background: rgba(0,201,177,.07);
    }
    .feedback-btn.unresolved {
      border-color: rgba(245,96,96,.3);
      color: #c94040;
      background: rgba(245,96,96,.06);
    }
    .feedback-btn.resolved:hover  { background: rgba(0,201,177,.14); }
    .feedback-btn.unresolved:hover{ background: rgba(245,96,96,.12); }
    /* 已点击后的锁定态 */
    .feedback-btn.active-resolved {
      border-color: #00C9B1;
      background: rgba(0,201,177,.18);
      color: #007f73;
      cursor: default;
      pointer-events: none;
    }
    .feedback-btn.active-unresolved {
      border-color: #e05050;
      background: rgba(230,80,80,.14);
      color: #b83232;
      cursor: default;
      pointer-events: none;
    }
    .feedback-toast {
      font-size: 11px;
      color: var(--text-muted);
      padding: 3px 8px;
      background: var(--bg-input);
      border-radius: 100px;
      border: 1px solid var(--border);
      white-space: nowrap;
    }



    /* Input Area */
    .input-area {
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      padding: 12px 16px 20px;
      flex-shrink: 0;
    }
    .input-row { display: flex; align-items: flex-end; gap: 10px; }
    .input-box {
      flex: 1;
      min-height: 40px;
      max-height: 100px;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: var(--font);
      color: var(--text-primary);
      resize: none;
      outline: none;
      line-height: 1.4;
      transition: var(--transition);
    }
    .input-box:focus {
      border-color: var(--brand-accent);
      box-shadow: 0 0 0 3px rgba(43,127,255,.1);
    }
    .input-box::placeholder { color: var(--text-muted); }

    .btn-send {
      width: 40px; height: 40px;
      border: none;
      background: var(--brand-accent);
      border-radius: 50%;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(43,127,255,.4);
    }
    .btn-send:hover { background: #1A6FE8; }
    .btn-send:disabled { background: var(--border); box-shadow: none; cursor: not-allowed; }

    .input-actions { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    .btn-action {
      height: 28px;
      padding: 0 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 11px;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: var(--font);
      transition: var(--transition);
    }
    .btn-action:hover { border-color: var(--brand-accent); color: var(--brand-accent); }
    .btn-action.call { border-color: rgba(0,201,177,.3); color: var(--brand-teal); }
    .btn-action.call:hover { background: rgba(0,201,177,.08); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,22,40,.7);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-sheet {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      background: var(--bg-card);
      border-radius: 28px 28px 0 0;
      padding: 0 0 40px;
      transform: translateY(100%);
      transition: transform .35s cubic-bezier(.4,0,.2,1);
    }
    .modal-overlay.open .modal-sheet { transform: translateY(0); }
    .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 14px auto 0; }
    .modal-header { padding: 20px 24px 0; display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-size: 18px; font-weight: 700; }
    .btn-modal-close {
      width: 32px; height: 32px; border: none; background: var(--bg-input);
      border-radius: 50%; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .call-options { padding: 16px 24px; display: flex; flex-direction: column; gap: 10px; }
    .call-option {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      cursor: pointer;
    }
    .call-option:hover { border-color: var(--brand-accent); background: rgba(43,127,255,.04); }
    .call-option-icon {
      width: 40px; height: 40px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .call-option-icon.green { background: rgba(0,201,177,.12); }
    .call-option-icon.blue { background: rgba(43,127,255,.12); }
    .call-option-icon.gold { background: rgba(245,166,35,.12); }
    .call-option-text { flex: 1; }
    .call-option-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .call-option-desc { font-size: 11px; color: var(--text-secondary); }
    .call-notice {
      margin: 0 24px;
      padding: 10px 12px;
      background: rgba(245,166,35,.08);
      border: 1px solid rgba(245,166,35,.2);
      border-radius: var(--radius-sm);
      font-size: 11px;
      color: #B07D1A;
    }

    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .input-area { padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
      .fab { bottom: calc(24px + env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>

  <!-- Floating Button -->
  <div class="fab" onclick="openChat()">💬</div>

  <!-- Chat Overlay -->
  <div class="chat-overlay" id="chatOverlay">
    <!-- Header -->
    <div class="chat-header">
      <button class="btn-close" onclick="closeChat()">✕</button>
      <div class="chat-agent-info">
        <div class="agent-avatar">${elephantAvatarSVG}</div>
        <div>
          <div class="agent-name">小象 · AI 客服</div>
          <div class="agent-status">在线服务中</div>
        </div>
      </div>
      <button class="btn-call-header" onclick="openCallModal()">📞</button>
    </div>

    <!-- Messages -->
    <div class="messages-area" id="messagesArea"></div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-row">
        <textarea class="input-box" id="inputBox" placeholder="请输入您的问题…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="btn-send" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>

  <!-- Call Modal -->
  <div class="modal-overlay" id="callModal" onclick="closeCallModal(event)">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <span class="modal-title">联系人工客服</span>
        <button class="btn-modal-close" onclick="closeCallModal()">✕</button>
      </div>
      <div class="call-options">
        <div class="call-option" onclick="makeCall('400-888-0001')">
          <div class="call-option-icon green">📞</div>
          <div class="call-option-text">
            <div class="call-option-name">综合客服热线</div>
            <div class="call-option-desc">400-888-0001 · 工作日 09:00–21:00</div>
          </div>
        </div>
        <div class="call-option" onclick="makeCall('400-888-0002')">
          <div class="call-option-icon blue">🚨</div>
          <div class="call-option-text">
            <div class="call-option-name">紧急事故专线</div>
            <div class="call-option-desc">400-888-0002 · 24小时</div>
          </div>

/* Message functions */
function getTime() {
  return new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

function addUserMessage(text) {

  row.className = 'msg-row user';
  row.innerHTML = `
    <div class="msg-avatar user-av">我</div>

    <div class="msg-avatar ai">${elephantAvatarSVG}</div>

function addAIMessage(text) {
  const area = document.getElementById('messagesArea');
  const row = document.createElement('div');
  row.className = 'msg-row ai';

  // 生成唯一 id 用于反馈联动
  const fbId = 'fb_' + Date.now() + '_' + Math.floor(Math.random()*1000);

  row.innerHTML = `
    <div class="msg-avatar ai">${elephantAvatarSVG}</div>
    <div class="msg-content">
      <div class="msg-bubble ai">${text.replace(/\n/g, '<br/>')}</div>

        <span class="feedback-label">是否解决了您的问题？</span>
        <button class="feedback-btn resolved" onclick="submitFeedback('${fbId}', true)">✓ 已解决</button>
        <button class="feedback-btn unresolved" onclick="submitFeedback('${fbId}', false)">✗ 未解决</button>
      </div>
      <div class="msg-time">${getTime()}</div>
    </div>
  `;
  area.appendChild(row);
  scrollBottom();
}

/* Send logic */
function sendMessage() {
  const box = document.getElementById('inputBox');
  const text = box.value.trim();
  if (!text || isTyping) return;
  box.value = '';
  autoResize(box);
  addUserMessage(text);
  
  // 检查是否命中问答库
  let hitKnowledgeBase = false;
  for (const key of Object.keys(aiResponses)) {
    if (key !== 'default' && text.includes(key)) {
      hitKnowledgeBase = true;
      break;
    }
  }
  
  if (hitKnowledgeBase) {
    // 命中问答库，显示普通typing后回复
    triggerAI(text, false);
  } else {
    // 未命中知识库，显示思考状态
    showThinkingState(text);
  }
}

function sendQuick(text) {
  addUserMessage(text);
  
  // 检查是否命中问答库
  let hitKnowledgeBase = false;
  for (const key of Object.keys(aiResponses)) {
    if (key !== 'default' && text.includes(key)) {
      hitKnowledgeBase = true;
      break;
    }
  }
  
  if (hitKnowledgeBase) {
    // 命中问答库，显示普通typing后回复
    triggerAI(text, false);
  } else {
    // 未命中，显示思考中状态
    showThinkingState(text);
  }
}

function showThinkingState(text) {
  isTyping = true;
  document.getElementById('sendBtn').disabled = true;
  addThinkingMessage();
  
  // 模拟知识库检索思考过程（2-3秒）
  const thinkTime = 2000 + Math.random() * 1000;
  setTimeout(() => {
    removeThinkingMessage();
    // 思考结束后直接回复（知识库综合回答）
    const resp = getKnowledgeResponse(text);
    addAIMessage(resp.text);
    isTyping = false;
    document.getElementById('sendBtn').disabled = false;
  }, thinkTime);
}

function getKnowledgeResponse(userText) {
  // 知识库检索逻辑
  let resp = null;
  const keywords = {
    '安全培训': aiResponses['安全培训报名'],
    '培训': aiResponses['安全培训报名'],
    '理赔': aiResponses['保险理赔流程'],
    '保险': aiResponses['保险理赔流程'],
    '贷款': aiResponses['贷款业务咨询'],
    '利率': aiResponses['贷款业务咨询'],
    '车队': aiResponses['车队管理问题'],
    '管理': aiResponses['车队管理问题'],
    '维修': aiResponses['维修保养预约'],
    '保养': aiResponses['维修保养预约'],
    '政策': aiResponses['政策法规咨询'],
    '法规': aiResponses['政策法规咨询']
  };
  for (const [kw, r] of Object.entries(keywords)) {
    if (userText.includes(kw)) { resp = r; break; }
  }
  if (!resp) resp = aiResponses.default;
  return resp;
}

function addThinkingMessage() {
  const area = document.getElementById('messagesArea');
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.id = 'thinkingRow';
  row.innerHTML = `
    <div class="msg-avatar ai">${elephantAvatarSVG}</div>
    <div class="msg-content">
      <div class="thinking-bubble">
        <div class="thinking-dots">
          <span></span><span></span><span></span>
        </div>
        <span class="thinking-text">正在检索知识库...</span>
      </div>
      <div class="msg-time">${getTime()}</div>
    </div>
  `;
  area.appendChild(row);
  scrollBottom();
}

function removeThinkingMessage() {
  const el = document.getElementById('thinkingRow');
  if (el) el.remove();
  isTyping = false;
  document.getElementById('sendBtn').disabled = false;
}

function hideFAQ() {
  document.getElementById('faqSection').style.display = 'none';
}

function triggerAI(userText, showTyping = true) {
  if (showTyping) {
    isTyping = true;
    document.getElementById('sendBtn').disabled = true;
    addTyping();
  }

  const delay = showTyping ? 800 + Math.random() * 1000 : 100;
  
  setTimeout(() => {
    if (showTyping) {
      removeTyping();
      isTyping = false;
      document.getElementById('sendBtn').disabled = false;
    }

    let resp = null;
    for (const key of Object.keys(aiResponses)) {
      if (key !== 'default' && userText.includes(key)) {
        resp = aiResponses[key];
        break;
      }
    }
    if (!resp) {
      resp = getKnowledgeResponse(userText);
    }
    if (!resp) resp = aiResponses.default;

    addAIMessage(resp.text);
  }, delay);
}

/* Feedback */
function submitFeedback(fbId, resolved) {
  const bar = document.getElementById(fbId);
  if (!bar) return;
  const btns = bar.querySelectorAll('.feedback-btn');
  const label = bar.querySelector('.feedback-label');

  // 锁定两个按钮，高亮选中的
  btns.forEach(b => {
    b.classList.remove('resolved', 'unresolved');
    b.style.display = 'none';
  });
  label.style.display = 'none';

  if (resolved) {
    bar.innerHTML = `<span class="feedback-toast">✓ 感谢反馈，问题已解决 😊</span>`;
  } else {
    bar.innerHTML = `
      <span class="feedback-toast" style="color:var(--brand-accent);border-color:rgba(43,127,255,.25);background:rgba(43,127,255,.06)">
        转人工客服帮您进一步解答？
      </span>
      <button class="feedback-btn resolved" onclick="openCallModal()" style="margin-left:4px">📞 联系客服</button>
    `;
  }
  scrollBottom();
}

/* Helpers */
function scrollBottom() {
  setTimeout(() => document.getElementById('messagesArea').scrollTop = document.getElementById('messagesArea').scrollHeight, 50);
}
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }

/* Call Modal */
function openCallModal() { document.getElementById('callModal').classList.add('open'); }
function closeCallModal(e) { if (!e || e.target === document.getElementById('callModal')) { document.getElementById('callModal').classList.remove('open'); } }
function makeCall(num) { window.location.href = 'tel:' + num; closeCallModal(); }

</script>
